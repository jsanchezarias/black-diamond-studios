
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Black Diamond App</title>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <style>
      html, body { margin: 0; padding: 0; background: #0f1014; }
      @keyframes bd-spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>

  <body>
    <div id="root">
      <div style="position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:#0f1014;">
        <div style="text-align:center;">
          <div style="width:52px;height:52px;border:3px solid rgba(201,169,97,0.3);border-top-color:#c9a961;border-radius:50%;animation:bd-spin 0.9s linear infinite;margin:0 auto 1.25rem;"></div>
          <div style="color:#c9a961;font-family:Georgia,serif;font-size:1.5rem;letter-spacing:0.1em;">&#9670; Black Diamond</div>
          <div style="color:#555;font-size:0.8rem;margin-top:0.5rem;font-family:sans-serif;">Cargando...</div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
